name: Deploy Voice Agent to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Droplet
        run: |
          ssh -o StrictHostKeyChecking=no root@143.244.129.204 << 'DEPLOY'
          cd /home/dilkasun071/voice-agent
          git pull origin main
          npm install
          pm2 stop voice-agent 2>/dev/null || pm2 restart voice-agent
          pm2 save
          echo "✓ Deployment successful!"
          DEPLOY
