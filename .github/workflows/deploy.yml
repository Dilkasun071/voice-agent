name: Deploy Voice Agent to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Pull and restart app
        run: |
          ssh -o StrictHostKeyChecking=no root@143.244.129.204 << 'DEPLOY'
          cd /home/dilkasun071/voice-agent
          git pull origin main
          npm install
          pm2 restart voice-agent || pm2 start app.js --name voice-agent
          pm2 save
          DEPLOY
