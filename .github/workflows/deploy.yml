name: Deploy Voice Agent to DigitalOcean

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VOICE_AGENT }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to droplet
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} << 'DEPLOY'
          cd /home/dilkasun071/voice-agent
          git pull origin main
          npm install
          pm2 stop voice-agent 2>/dev/null || true
          pm2 start app.js --name voice-agent
          pm2 save
          echo "✓ Deployment successful!"
          DEPLOY

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
