name: Test Secret

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check if secret exists
        run: |
          if [ -z "${{ secrets.DO_SSH_KEY }}" ]; then
            echo "ERROR: DO_SSH_KEY is empty!"
            exit 1
          else
            echo "✓ DO_SSH_KEY is set (length: $(echo -n '${{ secrets.DO_SSH_KEY }}' | wc -c) chars)"
          fi
