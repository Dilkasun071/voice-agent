name: Test Secret Exists

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check if SSH_PRIVATE_KEY secret exists
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "❌ ERROR: SSH_PRIVATE_KEY is EMPTY!"
            exit 1
          else
            KEY_LENGTH=$(echo -n "${{ secrets.SSH_PRIVATE_KEY }}" | wc -c)
            echo "✅ SSH_PRIVATE_KEY is set"
            echo "   Length: $KEY_LENGTH characters"
            echo "   First 50 chars: $(echo '${{ secrets.SSH_PRIVATE_KEY }}' | head -c 50)..."
          fi
